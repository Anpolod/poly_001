# Polymarket Sports — Configuration
# Copy this file to settings.yaml and fill in your parameters

database:
  host: localhost      # override: DB_HOST env var
  port: 5432           # override: DB_PORT env var
  name: polymarket_sports  # override: DB_NAME env var
  user: postgres       # override: DB_USER env var
  password: ""         # override: DB_PASSWORD env var (recommended for production)

api:
  gamma_base_url: "https://gamma-api.polymarket.com"
  clob_base_url: "https://clob.polymarket.com"
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  request_delay_sec: 1.0  # seconds between API requests

phase0:
  min_volume_24h: 5000          # $ minimum volume to include a market
  est_slippage_pct: 0.5         # % estimated slippage
  adverse_selection_mult: 1.5   # spread multiplier for maker adverse selection
  maker_rebate_pct: 25          # % of taker fee returned as maker rebate
  ratio_go_threshold: 2.0       # ratio above this = GO
  ratio_marginal_threshold: 1.5 # ratio above this = MARGINAL
  output_file: "phase0_results.csv"

phase1:
  snapshot_interval_sec: 60     # 1 minute
  market_rescan_interval_sec: 3600  # 1 hour
  min_volume_24h: 10000         # $ minimum volume for subscription
  max_spread: 0.03              # 3¢ maximum spread
  min_depth: 1000               # $ minimum orderbook depth

# Optional overrides for filter_tradeable() thresholds.
# If omitted, falls back to phase1 values (min_volume_24h, max_spread, min_depth).
filter_tradeable:
  min_volume_24h:  10000   # $ min 24h volume
  max_spread:      0.03    # max bid-ask spread
  min_depth:       1000    # $ min side depth
  mid_extreme_low: 0.15    # exclude markets trading below this price
  mid_extreme_high: 0.85   # exclude markets trading above this price
  mid_favorite:    0.80    # exclude strong favorites above this price

collector:
  ws_reconnect_base_delay: 5
  ws_reconnect_max_delay: 60
  ws_reconnect_backoff: 2.0
  rest_fallback_interval: 30
  gap_threshold_minutes: 5
  heartbeat_interval: 60
  ws_silence_threshold_sec: 60      # seconds of WS silence before REST fallback kicks in
  ws_orderbook_subscribe: true      # enable tick-level orderbook updates via WS
  spike_detection_realtime: true    # flag consecutive 1¢ moves in-stream

alerts:
  # Slack Incoming Webhook URL — leave blank to disable Slack notifications.
  # Create one at: https://api.slack.com/messaging/webhooks
  # Triggers: Phase 0 summary, collector start, data gap, spike, WS reconnect loop (≥3 attempts)
  slack_webhook_url: ""

  # Telegram Bot notifications — leave blank to disable.
  # 1. Create a bot via @BotFather → get token
  # 2. Write /start to your bot, then run: python scripts/send_signals.py --dry-run
  #    to discover your chat_id, OR check via getUpdates API.
  # Triggers: signal digest (tanking + props), prop opportunities (daemon mode)
  telegram_bot_token: ""
  telegram_chat_id: ""

injury_scanner:
  enabled: true               # set false to disable Rotowire injury alerts
  scan_interval_min: 10       # run every 10 min (separate from main 5-min cycle)
  hours_window: 24            # only games starting within N hours
  statuses: "OUT,DOUBTFUL"    # comma-separated Rotowire statuses to alert on
  max_entry_price: 0.85       # only BUY if healthy team's YES price below this

calibration_trader:
  enabled: true               # set false to disable calibration-edge alerts
  scan_interval_min: 60       # run every 60 min (the edge table is static day-to-day)
  min_edge_pct: 5.0           # only alert when |actual_win_rate - price| >= this (% points)
  min_confidence: "HIGH"      # HIGH (n>=50) / MEDIUM (n>=20) / LOW
  hours_window: 48            # only games starting within N hours
  max_signals: 10             # cap Telegram digest size per cycle

drift_monitor:
  enabled: true               # T-30: cross-sport real-time drift alerts
  scan_interval_min: 15       # run every 15 min
  drift_threshold_pct: 4.0    # alert when |drift_pct| >= this over the lookback window
  lookback_hours: 6.0         # how far back to compare current price
  upcoming_hours: 48          # only consider markets starting within N hours
  max_signals: 20             # cap Telegram digest size per cycle

spike_follow:
  enabled: true               # T-31: follow direction of finalized spikes
  scan_interval_min: 5        # run every 5 min (spikes are time-sensitive)
  since_minutes: 30           # only consider spike_events from the last N minutes
  min_magnitude: 0.05         # 5¢ minimum spike magnitude
  min_steps: 4                # 4 consecutive same-direction steps
  min_hours_to_game: 1.0      # skip spikes too close to tip-off
  upcoming_hours: 48
  max_signals: 10

prop_scanner:
  scan_interval_sec: 300      # run every 5 min in daemon mode
  alert_min_roi: 5.0          # only alert if ROI > 5%
  alert_min_depth_usd: 50     # skip markets with ask depth < $50
  price_min: 0.25             # minimum YES price to consider
  price_max: 0.58             # maximum YES price to consider
  hours_window: 24            # only games starting within N hours

mlb_pitcher_scanner:
  enabled: true               # T-45: gate for start_bot.sh + watchdog daemon
                              # (pre-T-45 the scanner was always launched,
                              #  ignoring this flag — operators on non-MLB
                              #  deployments got unsolicited ESPN traffic and
                              #  pitcher_signals writes)
  min_era_differential: 1.0   # only alert on ERA gap >= this
  hours_window: 48            # only games starting within N hours

trading:
  enabled: false              # set true to enable live order placement
  budget_usd: 100             # total USDC budget for the bot
  max_position_pct: 3.0       # max % of budget per trade (e.g. 3% = $3 on $100 budget)
  max_total_exposure_pct: 30.0  # max % of budget open at once (e.g. 30% = $30)
  min_ask_depth_usd: 50       # skip market if ask side thinner than this
  exit_minutes_before: 30     # auto-close positions N minutes before game_start
  price_slippage_tolerance: 0.03  # reject if live price exceeds signal price by >3¢
  scan_interval_sec: 300      # re-scan for new signals every N seconds
  confirm_timeout_sec: 300    # Telegram confirm window (5 min), then auto-skip

  # EV-based position sizing: scales size between ev_min_scale and 100% of max_position
  ev_min_roi_pct: 5.0         # ROI at this level → ev_min_scale of max position
  ev_max_roi_pct: 20.0        # ROI at this level → full max position
  ev_min_scale: 0.4           # fraction of max_position at minimum ROI

  # Risk guards
  stop_loss_pct: 40.0         # auto-exit if bid drops 40% below entry price
  stop_loss_check_sec: 300    # how often stop-loss monitor runs (seconds)
  take_profit_pct: 40.0       # auto-exit if bid rises 40% above entry (0 = disabled)
  daily_loss_limit_usd: 20.0  # circuit breaker: block new entries if daily loss exceeds this
  max_positions_per_game: 2   # max simultaneous positions within 3-hour game window
  max_positions_per_sport: 4  # max simultaneous positions per sport

  # Order management
  max_pending_hours: 6.0      # auto-cancel GTC order after this many hours unfilled
  reprice_after_hours: 2.0    # reprice LIVE order if unfilled for longer than this
  reprice_threshold_pct: 5.0  # reprice only if market ask moved >5% from entry price

  # Alerts
  low_balance_threshold_usd: 20.0   # Telegram alert if CLOB balance drops below this
  heartbeat_interval_hours: 6.0     # send "bot alive" ping every N hours (0 = disabled)

logging:
  level: INFO
  file: logs/collector.log
  rotation: daily
  retention_days: 30
