[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

# ---------------------------------------------------------------------------
# Ruff — linting + import sorting
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 120
exclude = ["venv", ".git", "__pycache__", "*.egg-info"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]
ignore = [
    "B905",  # zip() without strict= — not required for this project
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]  # test files can have long assertion strings

# ---------------------------------------------------------------------------
# Mypy — type checking
# ---------------------------------------------------------------------------

[tool.mypy]
python_version = "3.10"
explicit_package_bases = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false
no_strict_optional = true
exclude = ["venv/"]
