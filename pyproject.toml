[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

# ---------------------------------------------------------------------------
# Ruff — linting + import sorting
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 120
exclude = ["venv", ".git", "__pycache__", "*.egg-info"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]
ignore = [
    "B905",  # zip() without strict= — not required for this project
    # E402 (module-level import not at top) — entry points (trading/bot_main.py
    # and dashboard pages) bootstrap sys.path / load .env before the real
    # imports run. Every such import already has `# noqa: E402`, but ruff's
    # auto-fix splits multi-import blocks and the new lines don't inherit the
    # comment. Rather than maintain 60+ per-line comments across 13 files,
    # disable the rule globally — the real concern (uninitialized env at
    # import time) is enforced by block structure, not this style check.
    "E402",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]  # test files can have long assertion strings

# ---------------------------------------------------------------------------
# Mypy — type checking
# ---------------------------------------------------------------------------

[tool.mypy]
python_version = "3.10"
explicit_package_bases = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false
no_strict_optional = true
exclude = ["venv/"]

# dashboard/* uses streamlit APIs whose type stubs are incomplete/strict about
# Literal values — most errors there are tooling noise, not real bugs.
[[tool.mypy.overrides]]
module = "dashboard.*"
ignore_errors = true

# analytics/injury_scanner.py hits BeautifulSoup Tag.get() overload ambiguity
# which would require runtime isinstance checks to satisfy mypy; defer.
[[tool.mypy.overrides]]
module = "analytics.injury_scanner"
ignore_errors = true
